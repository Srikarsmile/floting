<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Floating Counselling">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F8F86"/>
      <stop offset="1" stop-color="#063836"/>
    </linearGradient>
    <linearGradient id="petal" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#FBF7EE"/>
      <stop offset="1" stop-color="#C7DDDA"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <g transform="translate(0 1)">
    <!-- outermost left -->
    <path d="M16 23 C12 20 11 14 16 7 C21 14 20 20 16 23 Z"
          fill="url(#petal)" opacity="0.55"
          transform="rotate(-46 16 25) scale(0.85 0.9) translate(2.8 2.5)"/>
    <!-- outermost right -->
    <path d="M16 23 C12 20 11 14 16 7 C21 14 20 20 16 23 Z"
          fill="url(#petal)" opacity="0.55"
          transform="rotate(46 16 25) scale(0.85 0.9) translate(-2.8 2.5)"/>
    <!-- inner left -->
    <path d="M16 23 C12 20 11 14 16 7 C21 14 20 20 16 23 Z"
          fill="url(#petal)" opacity="0.85"
          transform="rotate(-22 16 25) scale(0.95 0.97)"/>
    <!-- inner right -->
    <path d="M16 23 C12 20 11 14 16 7 C21 14 20 20 16 23 Z"
          fill="url(#petal)" opacity="0.85"
          transform="rotate(22 16 25) scale(0.95 0.97)"/>
    <!-- center, tallest -->
    <path d="M16 23 C12 20 11 14 16 6.5 C21 14 20 20 16 23 Z"
          fill="url(#petal)"/>
  </g>
</svg>
